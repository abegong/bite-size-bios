<div
  class="bio-card w-full lg:max-w-full lg:flex mt-4 overflow-hidden transition-all duration-300 hover:-translate-y-0.5"
>
  {{ if .Site.Params.post.thumbnail }}
    {{ if .Params.image }}
      <img
        alt="{{ .Title }}"
        class="{{ .Site.Params.post.thumbnail_width }} {{ .Site.Params.post.thumbnail_height }} object-cover"
        src="{{ .Params.image | relURL }}"
      />
    {{ else }}
      {{ if .Site.Params.post.noimage }}
        <img
          alt=""
          id="thumb"
          class="{{ .Site.Params.post.thumbnail_width }} {{ .Site.Params.post.thumbnail_height }} object-cover"
          src="{{ "/img/default.jpg" | relURL }}"
        />
      {{ end }}
    {{ end }}
  {{ end }}
  <div class="p-5 leading-normal max-w-full w-full">
    <div
      class="bio-title font-bold text-xl mb-2 leading-snug"
    >
      {{ .Title }}
    </div>
    <p class="bio-muted text-sm leading-relaxed">
      {{ substr .Summary 0 130 | plainify | htmlUnescape }}...
    </p>
  </div>
</div>
