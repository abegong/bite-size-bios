<div
  class="bg-white w-full lg:max-w-full lg:flex mt-4 rounded-xl shadow-sm overflow-hidden transition-all duration-300 hover:-translate-y-0.5 hover:shadow-md dark:bg-warmgray-900"
>
  {{ if .Site.Params.post.thumbnail }}
    {{ if .Params.image }}
      <img
        alt="thumbnail"
        id="thumb"
        class="{{ .Site.Params.post.thumbnail_width }} {{ .Site.Params.post.thumbnail_height }} object-cover"
        src="{{ .Params.image | relURL }}"
      />
    {{ else }}
      {{ if .Site.Params.post.noimage }}
        <img
          alt=""
          id="thumb"
          class="{{ .Site.Params.post.thumbnail_width }} {{ .Site.Params.post.thumbnail_height }} object-cover"
          src="{{ "/img/default.jpg" | relURL }}"
        />
      {{ end }}
    {{ end }}
  {{ end }}
  <div class="p-5 leading-normal max-w-full w-full">
    <div
      class="text-gray-900 font-bold text-xl mb-2 dark:text-white leading-snug"
    >
      {{ .Title }}
    </div>
    <p class="text-gray-600 text-sm leading-relaxed dark:text-gray-400">
      {{ substr .Summary 0 130 | plainify | htmlUnescape }}...
    </p>
  </div>
</div>
