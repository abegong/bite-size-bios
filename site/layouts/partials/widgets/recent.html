{{ $recent := where .Site.RegularPages "Type" "in" site.Params.mainSections }}
{{ $recent_num := ($.Site.Param `recentLimit` | default 5) }}
{{- if $recent }}
  <div
    class="bio-card mb-4 overflow-hidden"
  >
    <div class="px-5 py-4 border-b bio-rule">
      <p
        class="bio-kicker text-xs font-semibold uppercase tracking-widest"
      >
        Recent Biographies
      </p>
    </div>
    <div class="divide-y bio-rule">
      {{- range first $recent_num $recent }}
        <a
          href="{{ .RelPermalink }}"
          class="bio-list-link block px-5 py-3 transition-colors duration-150"
        >
          <p class="bio-title text-sm font-medium leading-snug">
            {{ .Title }}
          </p>
        </a>
      {{- end }}
    </div>
  </div>
{{- end }}
