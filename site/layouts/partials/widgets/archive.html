<div
  class="bio-card mb-4 overflow-hidden"
>
  <div class="px-5 py-4 border-b bio-rule">
    <p
      class="bio-kicker text-xs font-semibold uppercase tracking-widest"
    >
      Archives
    </p>
  </div>
  {{ if eq .Site.Params.archive_dropdown "false" }}
    <div class="divide-y bio-rule">
      {{ range $name, $items := .Site.Taxonomies.archives }}
        <a
          class="bio-list-link flex items-center justify-between px-5 py-3 transition-colors duration-150 text-sm"
          href="{{ printf "archives/%s/" ($name | urlize | lower) | relURL }}"
          ><span>{{ $name }}</span
          ><span class="bio-muted text-xs"
            >{{ $items.Count }}</span
          ></a
        >
      {{ end }}
    </div>
  {{ else }}
    <div class="p-4">
      <select
        class="w-full px-3 py-2 text-sm rounded-lg border bio-rule bio-card focus:outline-none focus:ring-2 focus:ring-bio-red"
        name="archive"
        onChange="location.href=value;"
      >
        <option>Select Archive...</option>
        {{ range $name, $items := .Site.Taxonomies.archives }}
          <option
            value="{{ printf "archives/%s/" ($name | urlize | lower) | relURL }}"
          >
            {{ $name }} ({{ $items.Count }})
          </option>
        {{ end }}
      </select>
    </div>
  {{ end }}
</div>
